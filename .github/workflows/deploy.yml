name: Deploy to OCI VM

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: ./backend
        run: npm ci

      # Adicione aqui passos de lint e teste
      # - name: Lint code
      #   run: npm run lint
      # - name: Run tests
      #   run: npm test

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.OCI_VM_HOST }}
          username: ${{ secrets.OCI_VM_USER }}
          key: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          script: |
            set -e
            echo "--- Starting deployment to ${{ secrets.OCI_VM_HOST }} ---"

            APP_DIR="/opt/saas-platform"
            # Use a variável de ambiente do GitHub para obter a URL do repositório dinamicamente
            REPO_URL="https://github.com/${{ github.repository }}.git"

            # Clona o repositório se não existir, ou atualiza se já existir
            if [ ! -d "$APP_DIR/.git" ]; then
              echo "Cloning repository..."
              git clone "$REPO_URL" "$APP_DIR"
            else
              echo "Repository exists. Fetching latest changes..."
            fi

            cd $APP_DIR
            echo "Fetching and resetting to the latest version of the main branch..."
            git fetch origin main
            git reset --hard origin/main

            # Cria o arquivo .env usando um heredoc para maior clareza e robustez
            echo "Creating .env file..."
            cat > deploy/.env << EOF
# For the backend service
DATABASE_URL=postgres://${{ secrets.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@postgres:5432/${{ secrets.POSTGRES_DB }}
API_DOMAIN=${{ secrets.API_DOMAIN }}
TRAEFIK_ACME_EMAIL=${{ secrets.TRAEFIK_ACME_EMAIL }}
REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
# For the postgres service
POSTGRES_USER=${{ secrets.POSTGRES_USER }}
POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
POSTGRES_DB=${{ secrets.POSTGRES_DB }}
EOF
            echo ".env file created."

            # Inicia/Atualiza todos os serviços
            cd deploy
            echo "Pulling latest base images..."
            docker compose pull
            echo "Starting services with Docker Compose..."
            docker compose up -d --build --force-recreate

            echo "--- Deployment finished successfully ---"