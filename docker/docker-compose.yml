
version: '3.9'

services:

  api:
    build: ../backend
    restart: always
    ports:
      - "3003:3003"
    depends_on:
      - redis
      - mysql-primary

  redis:
    image: redis:7
    restart: always
    ports:
      - "6379:6379"

  mysql-primary:
    image: mysql:8
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: app
    ports:
      - "3306:3306"
    command: >
      --server-id=1
      --log-bin=mysql-bin
      --binlog-format=ROW

  mysql-replica:
    image: mysql:8
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
    ports:
      - "3307:3306"
    command: >
      --server-id=2
      --relay-log=relay-log
      --read-only=1

  portainer:
    image: portainer/portainer-ce
    restart: always
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  semaphore:
    image: semaphoreui/semaphore:latest
    restart: always
    ports:
      - "3000:3000"
    environment:
      SEMAPHORE_DB_DIALECT: bolt
      SEMAPHORE_ADMIN: admin
      SEMAPHORE_ADMIN_PASSWORD: admin123
      SEMAPHORE_ADMIN_NAME: Admin
      SEMAPHORE_ADMIN_EMAIL: admin@local

  pmm-server:
    image: percona/pmm-server:2
    restart: always
    ports:
      - "8080:80"

  nginx:
    image: nginx
    restart: always
    ports:
      - "80:80"

