global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'api'
    # Supondo que sua API exponha métricas no formato Prometheus em /metrics
    # Se não, você precisará de um exportador ou biblioteca (ex: prom-client)
    static_configs:
      - targets: ['api:3003']

  # Adicione aqui exportadores para Nginx e Banco de Dados se desejar
  # - job_name: 'nginx-exporter'
  #   static_configs:
  #     - targets: ['nginx-exporter:9113']