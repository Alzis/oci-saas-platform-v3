# Define a zona de memória para o rate limiting. 10m pode armazenar ~160,000 IPs.
# Idealmente, esta linha deve estar no bloco http {} do seu nginx.conf principal.
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

# Define os servidores backend para balanceamento de carga e clareza
upstream api_backend {
    # O Docker Compose resolve 'api' para o IP do container da API
    server api:3003;
}

upstream grafana_backend {
    server grafana:3000;
}

server {
    listen 80;
    server_name your_domain.com; # <-- MUDE PARA SEU DOMÍNIO

    # Otimizações e Segurança
    gzip on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Headers de Segurança
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Rota para a API
    location /api/ {
        # Rate limiting básico: 10 requests por segundo
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Suporte a WebSocket (se necessário)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Rota para o Grafana
    location /grafana/ {
        proxy_pass http://grafana_backend/;
        proxy_set_header Host $host;
    }
}